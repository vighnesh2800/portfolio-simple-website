<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="container">

            <h1 class="sec-one__heading">Vighnesh</h1>

            <a href="index.html" class="sec-one__contact">Home</a>
        </div>

        <div class="sec-two">
            <form>
                <table>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Enter your name" class="sec-two__input"></td>
                    </tr>
                    <tr>
                        <td>Email:</td>
                        <td><input type="email" placeholder="Enter your email" class="sec-two__input"></td>
                    </tr>
                    <tr>
                        <td>Message:</td>
                        <td><textarea placeholder="Enter your message" class="sec-two__textarea"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Submit" class="sec-two__submit"></td>
                    </tr>
                </table>
            </form>
        </div>

        <div class="sec-three">
            <p class="sec-three__title">Social Media:<a href="https://www.instagram.com/vighnesh_2800" target="_blank">Instagram</a>,

            </p>
